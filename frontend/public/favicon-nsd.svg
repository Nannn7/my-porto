<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">NSD Portfolio Icon</title>
  <desc id="desc">Monogram N with code brackets and middleware flow nodes.</desc>
  <defs>
    <linearGradient id="bgGradient" x1="64" y1="56" x2="452" y2="456" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.55" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="lineGradient" x1="120" y1="370" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e6fffb"/>
      <stop offset="1" stop-color="#fff3e8"/>
    </linearGradient>
    <radialGradient id="glowGradient" cx="256" cy="190" r="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#05201d" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect x="36" y="36" width="440" height="440" rx="112" fill="url(#bgGradient)"/>
  <rect x="52" y="52" width="408" height="408" rx="96" fill="url(#glowGradient)"/>

  <g fill="none" stroke="#e9fffb" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.88">
    <path d="M126 172 L92 256 L126 340"/>
    <path d="M386 172 L420 256 L386 340"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="162" y="118" width="42" height="276" rx="21" fill="#f8fffe"/>
    <rect x="308" y="118" width="42" height="276" rx="21" fill="#f8fffe"/>
    <path d="M202 131 L308 280 L308 352 L202 203 Z" fill="#f8fffe"/>
  </g>

  <path d="M122 384 C160 348 194 374 224 392 C253 410 282 432 317 406 C340 389 364 375 390 386"
    fill="none" stroke="url(#lineGradient)" stroke-width="16" stroke-linecap="round"/>
  <g fill="#f8fffe">
    <circle cx="126" cy="384" r="12"/>
    <circle cx="224" cy="392" r="10"/>
    <circle cx="317" cy="406" r="10"/>
    <circle cx="390" cy="386" r="12"/>
  </g>
</svg>
