server {
    listen 80;
    server_name my-porto.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name my-porto.example.com;

    # Replace with actual certificate path in production.
    ssl_certificate /etc/letsencrypt/live/my-porto.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-porto.example.com/privkey.pem;

    # Frontend static build output (vite build).
    root /var/www/my-porto/frontend/dist;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:8080;
    }
}
