services:
  - type: web
    name: my-porto-api
    runtime: go
    rootDir: backend
    plan: free
    region: singapore
    buildCommand: go build -o bin/myporto-api ./cmd/server && go build -o bin/migrate ./cmd/migrate
    startCommand: /bin/sh -c "./bin/migrate up && ./bin/myporto-api"
    healthCheckPath: /api/health
    envVars:
      - key: APP_TLS_ENABLED
        value: "false"
      - key: APP_AUTO_MIGRATE
        value: "false"
      - key: ADMIN_SESSION_TTL_HOURS
        value: "24"
      - key: DATABASE_URL
        sync: false
      - key: DEFAULT_ADMIN_USERNAME
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
